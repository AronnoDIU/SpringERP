# Server Configuration
server.port=8080
server.servlet.context-path=/api/v1

# Application Name
spring.application.name=SpringERP

# Logging Configuration
logging.level.root=INFO
logging.level.com.springerp=INFO
# NOTE: Enable the following only in development profile, never in production
# logging.level.org.springframework.security=DEBUG
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Database Configuration
# Override these via environment variables: MYSQL_URL, MYSQL_USERNAME, MYSQL_PASSWORD
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/spring_erp}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# Use 'validate' in production to prevent accidental schema changes; use 'update' only in development
spring.jpa.hibernate.ddl-auto=update
# show-sql is false by default; enable only in development profile
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Flyway - ensures migrations run on startup
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false
spring.flyway.repair-on-migrate=true

# JWT Configuration
# IMPORTANT: Set JWT_SECRET as an environment variable in production (min 64 characters for HS512)
jwt.secret=${JWT_SECRET:springerpsecretkeywith512bitsforhs512algorithm12345678901234}
app.jwt.expiration-milliseconds=86400000

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Password Reset Configuration
app.password-reset.token.expiration=3600000
app.frontend.url=${FRONTEND_URL:http://localhost:3000}