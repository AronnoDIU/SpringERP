version: '3.9'

services:
  # ─── MySQL Database ─────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: springerp-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: spring_erp
      MYSQL_USER: ${MYSQL_USERNAME:-erp_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-erp_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Spring Boot Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: springerp-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_URL: jdbc:mysql://db:3306/spring_erp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: ${MYSQL_USERNAME:-erp_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-erp_password}
      JWT_SECRET: ${JWT_SECRET:-springerpsecretkeywith512bitsforhs512algorithm12345678901234}
      FRONTEND_URL: http://localhost:3000
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:-default}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── React Frontend ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: springerp-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1

volumes:
  db_data:
    driver: local

