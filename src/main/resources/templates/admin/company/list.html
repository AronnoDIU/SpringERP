<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companies - SpringERP Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap4.min.css">
</head>
<body class="hold-transition sidebar-mini layout-fixed">
    <div class="wrapper">
        <nav class="main-header navbar navbar-expand navbar-white navbar-light">
            <ul class="navbar-nav"><li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a></li></ul>
            <ul class="navbar-nav ml-auto"><li class="nav-item dropdown"><a class="nav-link" data-toggle="dropdown" href="#"><img src="/static/admin/img/avatar.jpg" class="img-circle elevation-2" alt="User" width="30" height="30"></a><div class="dropdown-menu dropdown-menu-lg dropdown-menu-right"><a href="/logout" class="dropdown-item"><i class="fas fa-sign-out-alt mr-2"></i> Logout</a></div></li></ul>
        </nav>

        <aside class="main-sidebar sidebar-dark-primary elevation-4">
            <a href="/admin" class="brand-link"><span class="brand-text font-weight-light">SpringERP</span></a>
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column">
                    <li class="nav-item"><a href="/admin" class="nav-link"><i class="nav-icon fas fa-tachometer-alt"></i><p>Dashboard</p></a></li>
                    <li class="nav-item has-treeview menu-open"><a href="#" class="nav-link active"><i class="nav-icon fas fa-building"></i><p>Companies <i class="right fas fa-angle-left"></i></p></a><ul class="nav nav-treeview" style="display: block;"><li class="nav-item"><a href="/admin/companies" class="nav-link active"><i class="far fa-circle nav-icon"></i><p>Manage Companies</p></a></li></ul></li>
                    <li class="nav-item has-treeview"><a href="#" class="nav-link"><i class="nav-icon fas fa-users"></i><p>Users <i class="right fas fa-angle-left"></i></p></a></li>
                </ul>
            </nav>
        </aside>

        <div class="content-wrapper">
            <div class="content-header">
                <div class="container-fluid">
                    <div class="row mb-2">
                        <div class="col-sm-6"><h1>Companies Management</h1></div>
                        <div class="col-sm-6">
                            <a href="/admin/companies/create" class="btn btn-primary float-right"><i class="fas fa-plus"></i> Create Company</a>
                        </div>
                    </div>
                </div>
            </div>

            <section class="content">
                <div class="container-fluid">
                    <div th:if="${message}" class="alert alert-success alert-dismissible"><span th:text="${message}"></span></div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible"><span th:text="${error}"></span></div>

                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">All Companies</h3>
                            <div class="card-tools">
                                <div class="input-group input-group-sm" style="width: 150px;">
                                    <input type="text" name="table_search" class="form-control float-right" placeholder="Search">
                                    <div class="input-group-append"><button type="submit" class="btn btn-default"><i class="fas fa-search"></i></button></div>
                                </div>
                            </div>
                        </div>
                        <div class="card-body">
                            <table class="table table-hover" id="companiesTable">
                                <thead>
                                    <tr>
                                        <th>Code</th>
                                        <th>Company Name</th>
                                        <th>Location</th>
                                        <th>Status</th>
                                        <th>Users</th>
                                        <th>Tier</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="company : ${companies.content}">
                                        <td><strong th:text="${company.companyCode}"></strong></td>
                                        <td th:text="${company.companyName}"></td>
                                        <td th:text="${company.city} + ', ' + ${company.country}"></td>
                                        <td>
                                            <span th:if="${company.status == 'ACTIVE'}" class="badge badge-success">Active</span>
                                            <span th:unless="${company.status == 'ACTIVE'}" class="badge badge-danger" th:text="${company.status}"></span>
                                        </td>
                                        <td class="text-center">
                                            <span class="badge badge-info">5</span>
                                        </td>
                                        <td th:text="${company.subscriptionTier}"></td>
                                        <td>
                                            <a th:href="@{/admin/companies/{id}(id=${company.id})}" class="btn btn-sm btn-info"><i class="fas fa-eye"></i></a>
                                            <a th:href="@{/admin/companies/{id}/edit(id=${company.id})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                                            <a th:href="@{/admin/companies/{id}(id=${company.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Delete?')"><i class="fas fa-trash"></i></a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <nav th:if="${companies.totalPages > 1}">
                        <ul class="pagination justify-content-center">
                            <li th:classappend="${companies.first} ? 'disabled' : ''">
                                <a th:href="@{/admin/companies(page=0)}" class="page-link">First</a>
                            </li>
                            <li th:each="p : ${#numbers.sequence(0, companies.totalPages-1)}" th:classappend="${p == companies.number} ? 'active' : ''">
                                <a th:href="@{/admin/companies(page=${p})}" class="page-link" th:text="${p + 1}"></a>
                            </li>
                            <li th:classappend="${companies.last} ? 'disabled' : ''">
                                <a th:href="@{/admin/companies(page=${companies.totalPages - 1})}" class="page-link">Last</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </section>
        </div>

        <footer class="main-footer"><strong>&copy; 2024 SpringERP</strong></footer>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.1/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/admin-lte/3.2.0/js/adminlte.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
</body>
</html>
